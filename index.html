<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojo Mojo | Étang-Salé les Bains</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --solar-sand: #fdf5e6;
            --deep-jungle: #1a3c34;
            --mojo-orange: #ff8c42;
            --glass-white: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--solar-sand);
            color: var(--deep-jungle);
            overflow-x: hidden;
        }

        /* Hero Section avec Image de fond Tropicale */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1510626176961-4b57d4fbad03?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Logo / Titre Style Recoleta */
        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: white;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Glassmorphism Card */
        .cta-card {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .btn {
            display: inline-block;
            background-color: var(--mojo-orange);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 140, 66, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
        }

        /* Menu Floating Icons (Instagram Vibe) */
        .social-links {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            border-bottom: 1px solid white;
            padding-bottom: 5px;
            transition: opacity 0.3s;
        }

        .social-links a:hover {
            opacity: 0.7;
        }

        /* Petit badge "Ouvert" dynamique */
        .status-badge {
            background: #4CAF50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .brand-name { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="status-badge">● Actuellement Ouvert</div>
        
        <h1 class="brand-name">Mojo Mojo</h1>
        <p class="tagline">Cocktails • Tapas • Sunset</p>

        <div class="cta-card">
            <p style="color: white; margin-bottom: 25px; line-height: 1.6;">
                L'âme tropicale de l'Étang-Salé. <br>
                Rejoignez-nous pour la "Golden Hour".
            </p>
            <a href="#" class="btn">Réserver une table</a>
            <a href="https://www.instagram.com/m0j0andm0j0" target="_blank" class="btn btn-outline">Voir la Carte</a>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/m0j0andm0j0">INSTAGRAM</a>
            <a href="#">FACEBOOK</a>
            <a href="#">MAPS</a>
        </div>
    </section>

</body>
</html>
