<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojo & Mojo | Healthy Cuisine Étang-Salé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --mojo-orange: #FF6B00;
            --mojo-orange-deep: #4d2000;
            --dark-deep: #0a0e0d;
            --card-bg: rgba(20, 25, 24, 0.9);
            --text-light: #f5f5f5;
            --whatsapp-green: #25D366;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-deep);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION & BURGER --- */
        .burger-btn {
            position: fixed; top: 20px; right: 20px; z-index: 3000;
            background: var(--mojo-orange); border: none;
            width: 50px; height: 50px; border-radius: 12px;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .burger-btn span { width: 25px; height: 3px; background: white; transition: 0.3s; }
        
        .side-menu {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: rgba(10, 14, 13, 0.98); backdrop-filter: blur(15px);
            z-index: 2500; display: flex; flex-direction: column;
            padding: 100px 40px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 2px solid var(--mojo-orange);
        }
        .side-menu.active { right: 0; }
        .side-menu a { color: white; text-decoration: none; font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; }
        .menu-overlay.active { display: block; }

        /* --- GRADIENT SECTION --- */
        .gradient-section {
            background: linear-gradient(180deg, var(--dark-deep) 0%, var(--mojo-orange-deep) 50%, var(--dark-deep) 100%);
            padding: 100px 20px; border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* --- HERO --- */
        header {
            height: 85vh;
            background: linear-gradient(rgba(10,14,13,0.4), rgba(10,14,13,0.9)), 
                        url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        .main-logo { 
            width: 160px; height: 160px; border-radius: 50%; object-fit: cover; 
            margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,107,0,0.3)); 
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #status-badge { font-size: 0.75rem; font-weight: 700; padding: 6px 16px; border-radius: 20px; background: rgba(0,0,0,0.6); margin-bottom: 15px; }

        /* --- NOUVELLE CARTE DE MENU (DÉTAILLÉE) --- */
        .section-menu-detail { padding: 40px 20px 80px; position: relative; z-index: 10; margin-top: -60px; }
        .menu-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; 
            padding: 10px 20px; border-radius: 50px; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab-btn.active { background: var(--mojo-orange); border-color: var(--mojo-orange); font-weight: 700; }

        .menu-items-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; max-width: 1100px; margin: 0 auto; 
        }
        
        .item-card {
            background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 25px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .item-card:hover { border-color: var(--mojo-orange); transform: translateY(-5px); }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-price { color: var(--mojo-orange); font-weight: 800; font-size: 1.2rem; }
        .item-card h4 { font-size: 1.1rem; text-transform: uppercase; color: #fff; }
        .item-card p { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
        .item-tags { display: flex; gap: 5px; margin-top: auto; }
        .tag { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .tag.best { background: var(--mojo-orange-deep); color: var(--mojo-orange); border: 1px solid var(--mojo-orange); }

        /* --- FOCUS PRODUIT --- */
        .product-focus { padding: 80px 20px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 50px; max-width: 1100px; margin: 0 auto; }
        .focus-img { width: 100%; max-width: 400px; border-radius: 30px; border: 2px solid var(--mojo-orange); }
        .focus-text { max-width: 500px; text-align: center; }

        /* --- VALEURS --- */
        .values-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .value-card { background: rgba(0,0,0,0.3); padding: 45px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .value-card h4 { color: var(--mojo-orange); margin-bottom: 15px; font-size: 1.2rem; }

        /* --- SOCIAL HUB --- */
        .social-hub { text-align: center; padding: 80px 20px; }
        .video-container { max-width: 320px; margin: 30px auto; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .insta-btn { border: 2px solid white; color: white; padding: 16px 45px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; display: inline-block; }

        /* --- LIVRE D'OR --- */
        .testimonial-container { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; scroll-snap-type: x mandatory; }
        .testimonial-card { min-width: 300px; background: rgba(255,255,255,0.03); padding: 35px; border-radius: 25px; border-left: 4px solid var(--mojo-orange); scroll-snap-align: center; }

        /* --- INFOS & MAP --- */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px; padding: 80px 0; align-items: center; max-width: 1000px; margin: 0 auto; }
        .map-container { border-radius: 30px; overflow: hidden; border: 2px solid var(--mojo-orange); height: 400px; }

        /* --- WHATSAPP --- */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: var(--whatsapp-green); color: white;
            width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; z-index: 2000; text-decoration: none;
        }

        /* --- FIN DE SITE --- */
        .footer-cta { background: var(--mojo-orange); color: white; padding: 80px 20px; text-align: center; }
        .btn-white { background: white; color: var(--mojo-orange); padding: 18px 50px; border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-block; margin-top: 25px; text-transform: uppercase; }

        .legal-footer { background: #000; padding: 30px 20px; text-align: center; }
        .legal-content { font-size: 0.7rem; color: #555; }
        .legal-content span { cursor: pointer; text-decoration: underline; margin: 0 10px; }

        /* --- MODALE --- */
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; padding: 50px 20px; }
        .modal-content { background: #1a1a1a; margin: auto; padding: 40px; border: 1px solid var(--mojo-orange); width: 100%; max-width: 700px; border-radius: 20px; color: #ccc; }
        .close-modal { color: var(--mojo-orange); float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .menu-items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="burger-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button
